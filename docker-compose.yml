services:
  postgres:
    image: postgres:16.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gentrix
      POSTGRES_USER: gentrix
      POSTGRES_PASSWORD: gentrix
    ports:
      - '${POSTGRES_PORT:-55432}:5432'
    volumes:
      - gentrix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gentrix -d gentrix']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NX_DAEMON: 'false'
      PORT: 3333
      DATABASE_URL: postgresql://gentrix:gentrix@postgres:5432/gentrix?schema=public
      AUTO_SEED_DEMO: 'true'
      GENTRIX_BACKEND_WATCH_POLLING: 'true'
      GENTRIX_BACKEND_WATCH_INTERVAL: '300'
    ports:
      - '${BACKEND_PORT:-3333}:3333'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps
      - ./libs:/app/libs
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./prisma.config.ts:/app/prisma.config.ts:ro
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3333/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: frontend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      GENTRIX_FRONTEND_HOST: 0.0.0.0
      GENTRIX_FRONTEND_PORT: 4200
      GENTRIX_BACKEND_PROXY_TARGET: http://backend:3333
      GENTRIX_FRONTEND_WATCH_POLLING: 'true'
    ports:
      - '${FRONTEND_PORT:-4200}:4200'
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps
      - ./libs:/app/libs
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./prisma.config.ts:/app/prisma.config.ts:ro

  frontend-preview:
    profiles: ['preview']
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: frontend-runtime
    restart: unless-stopped
    ports:
      - '${FRONTEND_PREVIEW_PORT:-4201}:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gentrix-postgres-data:
