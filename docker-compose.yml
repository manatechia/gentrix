services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gentrix
      POSTGRES_USER: gentrix
      POSTGRES_PASSWORD: gentrix
    ports:
      - '${POSTGRES_PORT:-55432}:5432'
    volumes:
      - gentrix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gentrix -d gentrix']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: backend-runtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://gentrix:gentrix@postgres:5432/gentrix?schema=public
      AUTO_SEED_DEMO: 'true'
    ports:
      - '${BACKEND_PORT:-3333}:3333'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3333/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: frontend-runtime
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-4200}:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gentrix-postgres-data:
